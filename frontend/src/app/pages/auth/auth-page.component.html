<div class="container vh-100 d-flex align-items-center justify-content-center">

  <div class="card shadow-lg border-0" style="width: 500px;">
    <div class="card-body p-4">
      <h2 class="text-center mb-4">
        Task Manager
      </h2>

      <ul class="nav nav-pills nav-fill mb-4"
          id="auth-tab"
          role="tablist">

        <li class="nav-item">
          <button
            class="nav-link active"
            data-bs-toggle="pill"
            data-bs-target="#login">
            Login
          </button>
        </li>

        <li class="nav-item">
          <button
            class="nav-link"
            data-bs-toggle="pill"
            data-bs-target="#register">
            Registro
          </button>
        </li>

      </ul>

      <div class="tab-content">

        <!-- LOGIN -->
        <div
          class="tab-pane fade show active"
          id="login">
          <form
            [formGroup]="loginForm"
            (ngSubmit)="login()">

            <div class="mb-3">
              <label class="form-label">Email</label>

              <input
                class="form-control"
                type="email"
                formControlName="email">
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>

              <input
                class="form-control"
                type="password"
                formControlName="password">
            </div>

            <button
              class="btn btn-primary w-100"
              type="submit">

              Ingresar
            </button>

          </form>
        </div>

        <!-- REGISTER -->
        <div class="tab-pane fade" id="register">

          <form
            [formGroup]="registerForm"
            (ngSubmit)="register()">

            <div class="mb-3">
              <label class="form-label">
                Email
              </label>

              <input
                class="form-control"
                type="email"
                formControlName="email">
            </div>

            <div class="mb-3">
              <label class="form-label">
                Password
              </label>

              <input
                class="form-control"
                type="password"
                formControlName="password">
            </div>

            <div class="mb-3">
              <label class="form-label">
                Nombre
              </label>

              <input
                class="form-control"
                formControlName="nombre">
            </div>

            <div class="mb-3">
              <label class="form-label">
                Team ID
              </label>

              <input
                class="form-control"
                formControlName="equipo">
            </div>

            <button
              class="btn btn-success w-100"
              type="submit">

              Registrarse
            </button>

          </form>
        </div>

      </div>

    </div>
  </div>

</div>
